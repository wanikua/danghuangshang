# [M-10] PR / push 触发的基本 CI 检查
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate JSON files
        run: |
          echo "=== Validating JSON files ==="
          ERRORS=0
          for f in openclaw.example.json configs/*/openclaw.json; do
            echo "  Checking $f..."
            if ! python3 -m json.tool "$f" > /dev/null 2>&1; then
              echo "  ❌ INVALID: $f"
              ERRORS=$((ERRORS + 1))
            fi
          done
          if [ "$ERRORS" -gt 0 ]; then
            echo "❌ $ERRORS JSON files invalid"
            exit 1
          fi
          echo "✅ All JSON files valid"

      - name: ShellCheck install scripts
        uses: ludeeus/action-shellcheck@2.0.0
        with:
          scandir: '.'
          additional_files: 'install.sh install-lite.sh install-mac.sh doctor.sh keepalive.sh scripts/safe-update.sh scripts/switch-regime.sh scripts/init-personas.sh scripts/extract-personas.sh scripts/backup-all.sh scripts/memory-backup.sh'
          severity: warning

      - name: Check Dockerfile builds
        run: docker build -t ai-court-test .

      - name: GUI server syntax check
        uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: node --check gui/server/index.js
